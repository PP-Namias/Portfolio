<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    
    <linearGradient id="pink-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>

    <linearGradient id="pink-glow-2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#9d174d"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#db2777" flood-opacity="0.25"/>
    </filter>

    <filter id="bg-glow">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect width="512" height="512" rx="112" fill="none" stroke="#27272a" stroke-width="4" />

  <circle cx="256" cy="256" r="140" fill="url(#pink-glow)" opacity="0.1" filter="url(#bg-glow)" />
  
  <g transform="translate(78, 150)" filter="url(#shadow)">
    <g fill="url(#pink-glow)">
      <rect x="120" y="0" width="36" height="150" />
      <path d="M 156 150 A 63 63 0 0 1 30 150 h 36 A 27 27 0 0 0 120 150 Z" />
      <rect x="30" y="115" width="36" height="35" />
    </g>
    <rect x="190" y="0" width="36" height="200" fill="url(#pink-glow-2)" />
    <rect x="290" y="0" width="36" height="200" fill="url(#pink-glow-2)" />
    <path d="M 190 0 h 36 L 326 200 h -36 Z" fill="url(#pink-glow)" opacity="0.95" />
  </g>
</svg>
