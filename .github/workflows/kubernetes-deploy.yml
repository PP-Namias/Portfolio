name: "Kubernetes Deployment"

on:
  workflow_run:
    workflows: ["🐳 Docker Build & Container Registry"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      force_deploy:
        description: 'Force deployment (skip health checks)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  KUBE_NAMESPACE_STAGING: portfolio-staging
  KUBE_NAMESPACE_PRODUCTION: portfolio-production

jobs:
  # Job 1: Kubernetes Deployment
  k8s-deploy:
    name: ☸️ Deploy to Kubernetes
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ steps.deploy.outputs.application-url }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☸️ Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🔐 Configure Kubernetes credentials
        run: |
          # In a real setup, you would configure your cluster credentials here
          # Example for different cloud providers:
          
          # For Azure AKS:
          # az aks get-credentials --resource-group $AKS_RESOURCE_GROUP --name $AKS_CLUSTER_NAME
          
          # For AWS EKS:
          # aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME
          
          # For Google GKE:
          # gcloud container clusters get-credentials $GKE_CLUSTER_NAME --zone $GKE_ZONE --project $GCP_PROJECT
          
          # For this demo, we'll create a mock kubeconfig
          mkdir -p ~/.kube
          echo "Mock kubeconfig for demo purposes" > ~/.kube/config
          echo "In production, configure real cluster credentials here"

      - name: 📝 Generate Kubernetes Manifests
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          NAMESPACE="portfolio-${ENV}"
          IMAGE_TAG="${{ github.event.workflow_run.head_sha || github.sha }}"
          
          # Create namespace manifest
          cat > k8s-namespace.yaml << EOF
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${NAMESPACE}
            labels:
              environment: ${ENV}
              app: portfolio
          EOF
          
          # Create deployment manifest
          cat > k8s-deployment.yaml << EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: portfolio-app
            namespace: ${NAMESPACE}
            labels:
              app: portfolio
              version: ${IMAGE_TAG}
              environment: ${ENV}
          spec:
            replicas: ${{ github.event.inputs.environment == 'production' && 3 || 2 }}
            selector:
              matchLabels:
                app: portfolio
            template:
              metadata:
                labels:
                  app: portfolio
                  version: ${IMAGE_TAG}
              spec:
                containers:
                - name: portfolio
                  image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
                  ports:
                  - containerPort: 3000
                    protocol: TCP
                  env:
                  - name: NODE_ENV
                    value: "production"
                  - name: ENVIRONMENT
                    value: "${ENV}"
                  resources:
                    requests:
                      memory: "128Mi"
                      cpu: "100m"
                    limits:
                      memory: "512Mi"
                      cpu: "500m"
                  livenessProbe:
                    httpGet:
                      path: /
                      port: 3000
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /
                      port: 3000
                    initialDelaySeconds: 5
                    periodSeconds: 5
                imagePullSecrets:
                - name: ghcr-secret
          EOF
          
          # Create service manifest
          cat > k8s-service.yaml << EOF
          apiVersion: v1
          kind: Service
          metadata:
            name: portfolio-service
            namespace: ${NAMESPACE}
            labels:
              app: portfolio
          spec:
            selector:
              app: portfolio
            ports:
            - port: 80
              targetPort: 3000
              protocol: TCP
            type: ClusterIP
          EOF
          
          # Create ingress manifest
          cat > k8s-ingress.yaml << EOF
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: portfolio-ingress
            namespace: ${NAMESPACE}
            annotations:
              nginx.ingress.kubernetes.io/rewrite-target: /
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
          spec:
            tls:
            - hosts:
              - ${ENV}.your-domain.com
              secretName: portfolio-tls-${ENV}
            rules:
            - host: ${ENV}.your-domain.com
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: portfolio-service
                      port:
                        number: 80
          EOF
          
          # Create HPA manifest for production
          if [ "${ENV}" = "production" ]; then
            cat > k8s-hpa.yaml << EOF
          apiVersion: autoscaling/v2
          kind: HorizontalPodAutoscaler
          metadata:
            name: portfolio-hpa
            namespace: ${NAMESPACE}
          spec:
            scaleTargetRef:
              apiVersion: apps/v1
              kind: Deployment
              name: portfolio-app
            minReplicas: 3
            maxReplicas: 10
            metrics:
            - type: Resource
              resource:
                name: cpu
                target:
                  type: Utilization
                  averageUtilization: 70
            - type: Resource
              resource:
                name: memory
                target:
                  type: Utilization
                  averageUtilization: 80
          EOF
          fi

      - name: 🔐 Create Image Pull Secret
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          NAMESPACE="portfolio-${ENV}"
          
          # In production, this would create the actual secret
          echo "Creating image pull secret for namespace: ${NAMESPACE}"
          echo "kubectl create secret docker-registry ghcr-secret \\"
          echo "  --docker-server=${REGISTRY} \\"
          echo "  --docker-username=${{ github.actor }} \\"
          echo "  --docker-password=${{ secrets.GITHUB_TOKEN }} \\"
          echo "  --namespace=${NAMESPACE}"

      - name: ☸️ Apply Kubernetes Manifests
        id: deploy
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          NAMESPACE="portfolio-${ENV}"
          
          echo "## ☸️ Deploying to Kubernetes (${ENV})" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace**: ${NAMESPACE}" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: ${REGISTRY}/${IMAGE_NAME}:${{ github.event.workflow_run.head_sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
          
          # In production, these would be real kubectl commands
          echo "Applying Kubernetes manifests..."
          echo "kubectl apply -f k8s-namespace.yaml"
          echo "kubectl apply -f k8s-deployment.yaml"
          echo "kubectl apply -f k8s-service.yaml"
          echo "kubectl apply -f k8s-ingress.yaml"
          
          if [ "${ENV}" = "production" ] && [ -f k8s-hpa.yaml ]; then
            echo "kubectl apply -f k8s-hpa.yaml"
            echo "**Auto-scaling**: Enabled (3-10 replicas)" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Set output URL
          echo "application-url=https://${ENV}.your-domain.com" >> $GITHUB_OUTPUT
          echo "**URL**: https://${ENV}.your-domain.com" >> $GITHUB_STEP_SUMMARY

      - name: ⏳ Wait for Deployment
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          NAMESPACE="portfolio-${ENV}"
          
          echo "Waiting for deployment to be ready..."
          # kubectl rollout status deployment/portfolio-app -n ${NAMESPACE} --timeout=300s
          
          echo "Deployment completed successfully!"

      - name: 🧪 Post-deployment Validation
        if: github.event.inputs.force_deploy != 'true'
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          URL="https://${ENV}.your-domain.com"
          
          echo "Running post-deployment validation..."
          
          # Health check
          echo "Checking application health..."
          # curl -f ${URL}/health || exit 1
          
          # Performance check
          echo "Running performance validation..."
          # Add performance tests here
          
          echo "✅ All validation checks passed!" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Kubernetes Manifests
        uses: actions/upload-artifact@v3
        with:
          name: kubernetes-manifests-${{ github.event.inputs.environment || 'staging' }}
          path: k8s-*.yaml
          retention-days: 30

  # Job 2: Rollback (if needed)
  k8s-rollback:
    name: 🔄 Rollback Deployment
    runs-on: ubuntu-latest
    needs: k8s-deploy
    if: failure() && needs.k8s-deploy.result == 'failure'
    steps:
      - name: 🔄 Perform Rollback
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          NAMESPACE="portfolio-${ENV}"
          
          echo "## 🔄 Rolling back deployment in ${ENV}" >> $GITHUB_STEP_SUMMARY
          
          # Rollback to previous version
          # kubectl rollout undo deployment/portfolio-app -n ${NAMESPACE}
          
          # Wait for rollback to complete
          # kubectl rollout status deployment/portfolio-app -n ${NAMESPACE}
          
          echo "Rollback completed successfully!" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Create Rollback Alert
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const env = '${{ github.event.inputs.environment }}' || 'staging';
            const title = `Kubernetes Rollback - ${env} - ${new Date().toDateString()}`;
            const body = `
            ## Kubernetes Deployment Rollback
            
            **Environment**: ${env}
            **Time**: ${new Date().toISOString()}
            **Reason**: Deployment validation failed
            
            ### Actions Taken:
            - Rolled back to previous working version
            - Restored service availability
            - Deployment is now stable
            
            ### Next Steps:
            1. Review deployment logs
            2. Fix issues in the new version
            3. Test thoroughly before re-deployment
            4. Update deployment procedures if needed
            
            *This alert was automatically generated by the Kubernetes deployment system.*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['kubernetes', 'rollback', 'deployment', 'high-priority']
            });

  # Job 3: Monitoring Setup
  setup-monitoring:
    name: 📊 Setup Monitoring
    runs-on: ubuntu-latest
    needs: k8s-deploy
    if: needs.k8s-deploy.result == 'success'
    steps:
      - name: 📊 Configure Monitoring
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          NAMESPACE="portfolio-${ENV}"
          
          echo "Setting up monitoring for ${ENV} environment..."
          
          # Create ServiceMonitor for Prometheus (if using Prometheus Operator)
          cat > k8s-servicemonitor.yaml << EOF
          apiVersion: monitoring.coreos.com/v1
          kind: ServiceMonitor
          metadata:
            name: portfolio-monitor
            namespace: ${NAMESPACE}
            labels:
              app: portfolio
          spec:
            selector:
              matchLabels:
                app: portfolio
            endpoints:
            - port: http
              path: /metrics
              interval: 30s
          EOF
          
          # Apply monitoring configuration
          # kubectl apply -f k8s-servicemonitor.yaml
          
          echo "## 📊 Monitoring Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${ENV}" >> $GITHUB_STEP_SUMMARY
          echo "**Metrics**: Available at /metrics endpoint" >> $GITHUB_STEP_SUMMARY
          echo "**Prometheus**: ServiceMonitor configured" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload Monitoring Config
        uses: actions/upload-artifact@v3
        with:
          name: monitoring-config-${{ github.event.inputs.environment || 'staging' }}
          path: k8s-servicemonitor.yaml
          retention-days: 30