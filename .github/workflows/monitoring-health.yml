name: 📊 Monitoring & Health Checks

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
  deployment_status:

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'
  PRODUCTION_URL: 'https://your-portfolio-domain.com' # Update with your actual domain

jobs:
  # Job 1: Uptime Monitoring
  uptime-check:
    name: 🌐 Uptime & Availability Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🌐 Check Website Availability
        run: |
          echo "## 🌐 Uptime Check Results" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check main domain
          if curl -f -s --max-time 30 "${{ env.PRODUCTION_URL }}" > /dev/null; then
            echo "✅ **Main Site**: Available" >> $GITHUB_STEP_SUMMARY
            MAIN_STATUS="✅ Available"
          else
            echo "❌ **Main Site**: Unavailable" >> $GITHUB_STEP_SUMMARY
            MAIN_STATUS="❌ Unavailable"
          fi
          
          # Check key pages
          pages=("/about/" "/projects/" "/gallery/" "/contact/")
          for page in "${pages[@]}"; do
            if curl -f -s --max-time 15 "${{ env.PRODUCTION_URL }}${page}" > /dev/null; then
              echo "✅ **${page}**: Available" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **${page}**: Unavailable" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: 🚨 Create Alert on Downtime
        if: failure()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `🚨 Website Downtime Alert - ${new Date().toDateString()}`;
            const body = `
            ## 🚨 Website Downtime Detected
            
            **Alert Time**: ${new Date().toISOString()}
            **URL**: ${{ env.PRODUCTION_URL }}
            **Status**: Website appears to be down or unresponsive
            
            ### Immediate Actions Required:
            1. Check hosting provider status
            2. Verify DNS configuration
            3. Check server logs
            4. Test from multiple locations
            
            ### Monitoring Details:
            - **Check Type**: Automated uptime monitoring
            - **Timeout**: 30 seconds
            - **Method**: HTTP GET request
            
            *This alert was automatically generated by the monitoring system.*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['alert', 'downtime', 'high-priority', 'monitoring']
            });

  # Job 2: Performance Monitoring
  performance-monitoring:
    name: ⚡ Performance Monitoring
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚡ Run Lighthouse Performance Audit
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            ${{ env.PRODUCTION_URL }}
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: 📊 Performance Report
        run: |
          echo "## ⚡ Performance Monitoring Report" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: ${{ env.PRODUCTION_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Metrics Tracked:" >> $GITHUB_STEP_SUMMARY
          echo "- **Performance Score**" >> $GITHUB_STEP_SUMMARY
          echo "- **First Contentful Paint (FCP)**" >> $GITHUB_STEP_SUMMARY
          echo "- **Largest Contentful Paint (LCP)**" >> $GITHUB_STEP_SUMMARY
          echo "- **Cumulative Layout Shift (CLS)**" >> $GITHUB_STEP_SUMMARY
          echo "- **Time to Interactive (TTI)**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Detailed results available in Lighthouse CI artifacts.*" >> $GITHUB_STEP_SUMMARY

  # Job 3: Broken Links Check
  broken-links-check:
    name: 🔗 Broken Links Detection
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔗 Install Link Checker
        run: npm install -g broken-link-checker

      - name: 🔗 Check for Broken Links
        run: |
          echo "## 🔗 Broken Links Check" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Target**: ${{ env.PRODUCTION_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Run broken link checker
          blc ${{ env.PRODUCTION_URL }} --recursive --follow --exclude-external > broken_links.txt 2>&1 || true
          
          if grep -q "BROKEN" broken_links.txt; then
            echo "❌ **Status**: Broken links detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Broken Links Found:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep "BROKEN" broken_links.txt >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **Status**: No broken links detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Broken Links Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: broken-links-report
          path: broken_links.txt
          retention-days: 7

  # Job 4: SSL Certificate Check
  ssl-certificate-check:
    name: 🔒 SSL Certificate Monitoring
    runs-on: ubuntu-latest
    steps:
      - name: 🔒 Check SSL Certificate
        run: |
          echo "## 🔒 SSL Certificate Status" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          
          # Extract domain from URL
          DOMAIN=$(echo "${{ env.PRODUCTION_URL }}" | sed 's|https\?://||' | cut -d'/' -f1)
          echo "**Domain**: $DOMAIN" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check SSL certificate expiration
          EXPIRY=$(echo | openssl s_client -servername $DOMAIN -connect $DOMAIN:443 2>/dev/null | openssl x509 -noout -dates | grep notAfter | cut -d'=' -f2)
          EXPIRY_TIMESTAMP=$(date -d "$EXPIRY" +%s)
          CURRENT_TIMESTAMP=$(date +%s)
          DAYS_UNTIL_EXPIRY=$(( (EXPIRY_TIMESTAMP - CURRENT_TIMESTAMP) / 86400 ))
          
          echo "**Expiry Date**: $EXPIRY" >> $GITHUB_STEP_SUMMARY
          echo "**Days Until Expiry**: $DAYS_UNTIL_EXPIRY" >> $GITHUB_STEP_SUMMARY
          
          if [ $DAYS_UNTIL_EXPIRY -lt 30 ]; then
            echo "⚠️ **Status**: SSL certificate expires soon!" >> $GITHUB_STEP_SUMMARY
            echo "ssl_warning=true" >> $GITHUB_ENV
          elif [ $DAYS_UNTIL_EXPIRY -lt 7 ]; then
            echo "🚨 **Status**: SSL certificate expires very soon!" >> $GITHUB_STEP_SUMMARY
            echo "ssl_critical=true" >> $GITHUB_ENV
          else
            echo "✅ **Status**: SSL certificate is valid" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🚨 Create SSL Alert
        if: env.ssl_warning == 'true' || env.ssl_critical == 'true'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const priority = process.env.ssl_critical === 'true' ? 'CRITICAL' : 'WARNING';
            const title = `🔒 SSL Certificate ${priority} - Renewal Required`;
            const body = `
            ## 🔒 SSL Certificate ${priority}
            
            **Domain**: ${{ env.PRODUCTION_URL }}
            **Alert Time**: ${new Date().toISOString()}
            **Priority**: ${priority}
            
            ### Certificate Status:
            The SSL certificate for your domain is expiring soon and requires renewal.
            
            ### Required Actions:
            1. Contact your hosting provider or SSL certificate authority
            2. Renew the SSL certificate before expiration
            3. Update DNS records if necessary
            4. Test the new certificate after installation
            
            ### Impact:
            - Users may see security warnings
            - Search engine rankings may be affected
            - Trust and credibility issues
            
            *This alert was automatically generated by the SSL monitoring system.*
            `;
            
            const labels = ['ssl-certificate', 'security', 'monitoring'];
            if (priority === 'CRITICAL') {
              labels.push('critical-priority');
            } else {
              labels.push('medium-priority');
            }
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: labels
            });

  # Job 5: Monitoring Summary
  monitoring-summary:
    name: 📊 Monitoring Summary
    runs-on: ubuntu-latest
    needs: [uptime-check, performance-monitoring, broken-links-check, ssl-certificate-check]
    if: always()
    steps:
      - name: 📊 Generate Monitoring Dashboard
        run: |
          echo "## 📊 System Health Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "**Report Generated**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Uptime Check | ${{ needs.uptime-check.result == 'success' && '✅ Online' || '❌ Issues Detected' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚡ Performance | ${{ needs.performance-monitoring.result == 'success' && '✅ Good' || '⚠️ Needs Attention' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Links Check | ${{ needs.broken-links-check.result == 'success' && '✅ No Broken Links' || '⚠️ Issues Found' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 SSL Certificate | ${{ needs.ssl-certificate-check.result == 'success' && '✅ Valid' || '⚠️ Needs Attention' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall System Status**: ${{ (needs.uptime-check.result == 'success' && needs.performance-monitoring.result == 'success' && needs.broken-links-check.result == 'success' && needs.ssl-certificate-check.result == 'success') && '🟢 All Systems Operational' || '🟡 Some Issues Detected' }}" >> $GITHUB_STEP_SUMMARY

      - name: 📈 Update Health Badge
        run: |
          # This could be extended to update a status badge or external monitoring service
          echo "Health monitoring completed at $(date)"