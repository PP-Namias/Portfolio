name: Daily Health Check

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: 🏥 Daily Health Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run Code Quality Check
        run: |
          echo "Running daily code quality check..."
          pnpm run lint

      - name: 🔧 TypeScript Check
        run: |
          echo "Running TypeScript type check..."
          pnpm exec tsc --noEmit

      - name: 🔒 Security Audit
        run: |
          echo "Running security audit..."
          pnpm audit --audit-level moderate || echo "Security audit completed with warnings"

      - name: 📊 Check Dependencies
        run: |
          echo "Checking for outdated dependencies..."
          pnpm outdated || echo "Some dependencies may need updates"

      - name: 🏗️ Build Test
        run: |
          echo "Testing build process..."
          pnpm run build

      - name: 📈 Generate Health Report
        run: |
          echo "## 🏥 Daily Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository Health**: ✅ Good" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ✅ No critical vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependencies**: ⚠️ Check outdated packages" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Create Issue on Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `🚨 Daily Health Check Failed - ${new Date().toDateString()}`;
            const body = `
            ## Daily Health Check Failure
            
            The automated daily health check has detected issues with the repository.
            
            **Date**: ${new Date().toISOString()}
            **Workflow Run**: [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### Potential Issues
            - Build failure
            - Security vulnerabilities
            - Dependency issues
            - Code quality problems
            
            Please review the workflow logs and address any issues found.
            
            *This issue was automatically created by the daily health check.*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['health-check', 'automated-issue', 'maintenance']
            });