name: 🚀 Production CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '8'

jobs:
  # Phase 1: Code Quality & Security
  quality:
    name: 🔍 Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🗂️ Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🔧 Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 ESLint Check
        run: pnpm run lint

      - name: 🔧 TypeScript Check
        run: pnpm exec tsc --noEmit

      - name: 🔒 Security Audit
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: 📊 Quality Report
        if: always()
        run: |
          echo "## 🔍 Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "✅ **ESLint**: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ **TypeScript**: No type errors" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Security**: Audit completed" >> $GITHUB_STEP_SUMMARY

  # Phase 2: Build & Test
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: quality
    outputs:
      build-success: ${{ steps.build.outcome }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🗂️ Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🔧 Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build for Production
        id: build
        run: |
          echo "Building application..."
          pnpm run build
          echo "Build completed successfully!"

      - name: 📊 Build Analysis
        run: |
          echo "## 🏗️ Build Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "dist" ]; then
            DIST_SIZE=$(du -sh dist | cut -f1)
            FILE_COUNT=$(find dist -type f | wc -l)
            echo "### 📦 Build Output:" >> $GITHUB_STEP_SUMMARY
            echo "- **Size**: $DIST_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- **Files**: $FILE_COUNT" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 30
          compression-level: 9

  # Phase 3: Deploy to Production (Vercel)
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://namias.tech
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: dist/

      - name: 🚀 Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        run: |
          npm install -g vercel
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --project=${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true

      - name: 📊 Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://namias.tech" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # Phase 4: Post-Deployment Checks
  verify:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 🌐 Health Check
        run: |
          echo "Checking production site..."
          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" https://namias.tech)
          
          if [ "$STATUS_CODE" -eq 200 ]; then
            echo "✅ Site is up and running!"
            echo "## ✅ Deployment Verified" >> $GITHUB_STEP_SUMMARY
            echo "- **URL**: https://namias.tech" >> $GITHUB_STEP_SUMMARY
            echo "- **Status**: 🟢 Online (200)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Site returned status code: $STATUS_CODE"
            echo "## ⚠️ Deployment Warning" >> $GITHUB_STEP_SUMMARY
            echo "- **Status Code**: $STATUS_CODE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔍 Performance Check
        run: |
          echo "Checking site performance..."
          LOAD_TIME=$(curl -o /dev/null -s -w "%{time_total}" https://namias.tech)
          echo "- **Load Time**: ${LOAD_TIME}s" >> $GITHUB_STEP_SUMMARY

  # Phase 5: Notifications
  notify:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [quality, build, deploy, verify]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: 🎉 Success Notification
        if: ${{ needs.build.result == 'success' && needs.deploy.result == 'success' }}
        run: |
          echo "## 🎉 Pipeline Success!" >> $GITHUB_STEP_SUMMARY
          echo "All stages completed successfully." >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Quality Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Verify" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Failure Notification
        if: ${{ needs.quality.result == 'failure' || needs.build.result == 'failure' || needs.deploy.result == 'failure' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const failedJobs = [];
            if ('${{ needs.quality.result }}' === 'failure') failedJobs.push('Quality Check');
            if ('${{ needs.build.result }}' === 'failure') failedJobs.push('Build');
            if ('${{ needs.deploy.result }}' === 'failure') failedJobs.push('Deploy');
            
            const body = `
            ## 🚨 Pipeline Failure
            
            **Failed Jobs**: ${failedJobs.join(', ')}
            **Branch**: ${context.ref}
            **Commit**: ${context.sha.substring(0, 7)}
            **Workflow**: [${context.workflow}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            
            Please check the logs and fix the issues.
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 CI/CD Pipeline Failed - ${new Date().toDateString()}`,
              body: body,
              labels: ['ci/cd', 'bug', 'automated']
            });
