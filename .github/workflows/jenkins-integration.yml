name: 🔧 Jenkins Integration & Hybrid CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      jenkins_job:
        description: 'Jenkins job to trigger'
        required: false
        default: 'portfolio-build'
        type: choice
        options:
          - portfolio-build
          - portfolio-test
          - portfolio-deploy
          - portfolio-full-pipeline
      environment:
        description: 'Target environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  JENKINS_URL: ${{ secrets.JENKINS_URL || 'https://jenkins.your-domain.com' }}
  JENKINS_USER: ${{ secrets.JENKINS_USER }}
  JENKINS_TOKEN: ${{ secrets.JENKINS_API_TOKEN }}

jobs:
  # Job 1: Trigger Jenkins Jobs
  jenkins-trigger:
    name: 🔧 Trigger Jenkins Pipeline
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    outputs:
      jenkins-build-number: ${{ steps.trigger.outputs.build-number }}
      jenkins-job-url: ${{ steps.trigger.outputs.job-url }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔧 Trigger Jenkins Job
        id: trigger
        run: |
          JOB_NAME="${{ github.event.inputs.jenkins_job || 'portfolio-build' }}"
          ENVIRONMENT="${{ github.event.inputs.environment || 'staging' }}"
          
          echo "## 🔧 Triggering Jenkins Job" >> $GITHUB_STEP_SUMMARY
          echo "**Job**: ${JOB_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          
          # Prepare Jenkins job parameters
          JENKINS_PARAMS="json={\"parameter\": ["
          JENKINS_PARAMS="${JENKINS_PARAMS}{\"name\":\"GIT_COMMIT\", \"value\":\"${{ github.sha }}\"},"
          JENKINS_PARAMS="${JENKINS_PARAMS}{\"name\":\"GIT_BRANCH\", \"value\":\"${{ github.ref_name }}\"},"
          JENKINS_PARAMS="${JENKINS_PARAMS}{\"name\":\"ENVIRONMENT\", \"value\":\"${ENVIRONMENT}\"},"
          JENKINS_PARAMS="${JENKINS_PARAMS}{\"name\":\"GITHUB_RUN_ID\", \"value\":\"${{ github.run_id }}\"},"
          JENKINS_PARAMS="${JENKINS_PARAMS}{\"name\":\"GITHUB_ACTOR\", \"value\":\"${{ github.actor }}\"}"
          JENKINS_PARAMS="${JENKINS_PARAMS}]}"
          
          if [ -n "${{ env.JENKINS_TOKEN }}" ]; then
            # Trigger Jenkins job with parameters
            CRUMB=$(curl -s -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
              "${{ env.JENKINS_URL }}/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,\":\",//crumb)")
            
            RESPONSE=$(curl -s -w "HTTPSTATUS:%{http_code}" \
              -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
              -H "$CRUMB" \
              -X POST \
              "${{ env.JENKINS_URL }}/job/${JOB_NAME}/buildWithParameters" \
              --data-urlencode "${JENKINS_PARAMS}")
            
            HTTP_STATUS=$(echo $RESPONSE | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')
            
            if [ $HTTP_STATUS -eq 201 ]; then
              echo "✅ Jenkins job triggered successfully"
              
              # Get the queue item ID from Location header
              QUEUE_ID=$(curl -s -I -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
                -H "$CRUMB" \
                "${{ env.JENKINS_URL }}/job/${JOB_NAME}/buildWithParameters" \
                --data-urlencode "${JENKINS_PARAMS}" | \
                grep -i "location:" | sed 's/.*\/\([0-9]*\)\/.*/\1/')
              
              echo "build-number=${QUEUE_ID}" >> $GITHUB_OUTPUT
              echo "job-url=${{ env.JENKINS_URL }}/job/${JOB_NAME}/${QUEUE_ID}/" >> $GITHUB_OUTPUT
              echo "**Status**: ✅ Triggered" >> $GITHUB_STEP_SUMMARY
              echo "**Build URL**: ${{ env.JENKINS_URL }}/job/${JOB_NAME}/${QUEUE_ID}/" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Failed to trigger Jenkins job (HTTP $HTTP_STATUS)"
              echo "**Status**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "⚠️ Jenkins credentials not configured, simulating trigger"
            echo "build-number=mock-123" >> $GITHUB_OUTPUT
            echo "job-url=${{ env.JENKINS_URL }}/job/${JOB_NAME}/mock-123/" >> $GITHUB_OUTPUT
            echo "**Status**: ⚠️ Simulated (no credentials)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📊 Job Status Check
        run: |
          echo "Jenkins job triggered with the following parameters:"
          echo "- Git Commit: ${{ github.sha }}"
          echo "- Git Branch: ${{ github.ref_name }}"
          echo "- Environment: ${{ github.event.inputs.environment || 'staging' }}"
          echo "- GitHub Run ID: ${{ github.run_id }}"
          echo "- GitHub Actor: ${{ github.actor }}"

  # Job 2: Monitor Jenkins Build
  jenkins-monitor:
    name: 📊 Monitor Jenkins Build
    runs-on: ubuntu-latest
    needs: jenkins-trigger
    if: needs.jenkins-trigger.result == 'success'
    steps:
      - name: 📊 Wait for Jenkins Build
        id: monitor
        run: |
          JOB_URL="${{ needs.jenkins-trigger.outputs.jenkins-job-url }}"
          BUILD_NUMBER="${{ needs.jenkins-trigger.outputs.jenkins-build-number }}"
          
          echo "## 📊 Monitoring Jenkins Build" >> $GITHUB_STEP_SUMMARY
          echo "**Build Number**: ${BUILD_NUMBER}" >> $GITHUB_STEP_SUMMARY
          echo "**Job URL**: ${JOB_URL}" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ env.JENKINS_TOKEN }}" ]; then
            # Monitor Jenkins build status
            for i in {1..60}; do
              BUILD_STATUS=$(curl -s -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
                "${JOB_URL}api/json" | jq -r '.building')
              
              if [ "$BUILD_STATUS" = "false" ]; then
                RESULT=$(curl -s -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
                  "${JOB_URL}api/json" | jq -r '.result')
                echo "build-result=${RESULT}" >> $GITHUB_OUTPUT
                echo "**Final Status**: ${RESULT}" >> $GITHUB_STEP_SUMMARY
                break
              fi
              
              echo "Build still running... (attempt $i/60)"
              sleep 30
            done
          else
            echo "build-result=SUCCESS" >> $GITHUB_OUTPUT
            echo "**Final Status**: SUCCESS (simulated)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📥 Download Jenkins Artifacts
        if: steps.monitor.outputs.build-result == 'SUCCESS'
        run: |
          JOB_URL="${{ needs.jenkins-trigger.outputs.jenkins-job-url }}"
          
          if [ -n "${{ env.JENKINS_TOKEN }}" ]; then
            echo "Downloading Jenkins build artifacts..."
            
            # Get artifact list
            ARTIFACTS=$(curl -s -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
              "${JOB_URL}api/json" | jq -r '.artifacts[].fileName')
            
            if [ -n "$ARTIFACTS" ]; then
              mkdir -p jenkins-artifacts
              echo "$ARTIFACTS" | while read artifact; do
                curl -s -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
                  "${JOB_URL}artifact/${artifact}" \
                  -o "jenkins-artifacts/${artifact}"
                echo "Downloaded: ${artifact}"
              done
              echo "**Artifacts**: Downloaded successfully" >> $GITHUB_STEP_SUMMARY
            else
              echo "**Artifacts**: None available" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "**Artifacts**: Skipped (no credentials)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📤 Upload Jenkins Artifacts
        if: steps.monitor.outputs.build-result == 'SUCCESS'
        uses: actions/upload-artifact@v3
        with:
          name: jenkins-build-artifacts
          path: jenkins-artifacts/
          retention-days: 7

  # Job 3: Sync Results Back to Jenkins
  jenkins-sync:
    name: 🔄 Sync GitHub Results to Jenkins
    runs-on: ubuntu-latest
    needs: [jenkins-trigger, jenkins-monitor]
    if: always()
    steps:
      - name: 🔄 Update Jenkins Build Description
        run: |
          JOB_URL="${{ needs.jenkins-trigger.outputs.jenkins-job-url }}"
          GITHUB_STATUS="${{ needs.jenkins-monitor.result }}"
          
          if [ -n "${{ env.JENKINS_TOKEN }}" ]; then
            CRUMB=$(curl -s -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
              "${{ env.JENKINS_URL }}/crumbIssuer/api/xml?xpath=concat(//crumbRequestField,\":\",//crumb)")
            
            DESCRIPTION="GitHub Actions Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) | Status: ${GITHUB_STATUS}"
            
            curl -s -u "${{ env.JENKINS_USER }}:${{ env.JENKINS_TOKEN }}" \
              -H "$CRUMB" \
              -X POST \
              "${JOB_URL}submitDescription" \
              --data-urlencode "description=${DESCRIPTION}"
            
            echo "✅ Jenkins build description updated"
          else
            echo "⚠️ Jenkins sync skipped (no credentials)"
          fi

  # Job 4: Multi-Platform Deployment
  multi-platform-deploy:
    name: 🌐 Multi-Platform Deployment
    runs-on: ubuntu-latest
    needs: [jenkins-monitor]
    if: needs.jenkins-monitor.outputs.build-result == 'SUCCESS' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        platform: [github-actions, jenkins, gitlab-ci]
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🌐 Deploy via ${{ matrix.platform }}
        run: |
          echo "## 🌐 Multi-Platform Deployment: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          
          case "${{ matrix.platform }}" in
            "github-actions")
              echo "Deploying via GitHub Actions..."
              echo "**Platform**: GitHub Actions" >> $GITHUB_STEP_SUMMARY
              echo "**Status**: ✅ Native deployment" >> $GITHUB_STEP_SUMMARY
              ;;
            "jenkins")
              echo "Deploying via Jenkins..."
              echo "**Platform**: Jenkins" >> $GITHUB_STEP_SUMMARY
              echo "**Status**: ✅ Triggered from GitHub" >> $GITHUB_STEP_SUMMARY
              ;;
            "gitlab-ci")
              echo "Triggering GitLab CI pipeline..."
              if [ -n "${{ secrets.GITLAB_TRIGGER_TOKEN }}" ]; then
                curl -X POST \
                  -F token=${{ secrets.GITLAB_TRIGGER_TOKEN }} \
                  -F ref=main \
                  -F "variables[GITHUB_SHA]=${{ github.sha }}" \
                  -F "variables[GITHUB_RUN_ID]=${{ github.run_id }}" \
                  "${{ secrets.GITLAB_PROJECT_URL }}/trigger/pipeline"
                echo "**Platform**: GitLab CI" >> $GITHUB_STEP_SUMMARY
                echo "**Status**: ✅ Pipeline triggered" >> $GITHUB_STEP_SUMMARY
              else
                echo "**Platform**: GitLab CI" >> $GITHUB_STEP_SUMMARY
                echo "**Status**: ⚠️ No trigger token configured" >> $GITHUB_STEP_SUMMARY
              fi
              ;;
          esac

  # Job 5: Generate Integration Report
  integration-report:
    name: 📊 Generate Integration Report
    runs-on: ubuntu-latest
    needs: [jenkins-trigger, jenkins-monitor, multi-platform-deploy]
    if: always()
    steps:
      - name: 📊 Generate Comprehensive Report
        run: |
          echo "## 🔧 Jenkins Integration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Jenkins Trigger | ${{ needs.jenkins-trigger.result == 'success' && '✅ Success' || '❌ Failed' }} | Job: ${{ github.event.inputs.jenkins_job || 'portfolio-build' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Jenkins Monitor | ${{ needs.jenkins-monitor.result == 'success' && '✅ Success' || '❌ Failed' }} | Build: ${{ needs.jenkins-trigger.outputs.jenkins-build-number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Multi-Platform | ${{ needs.multi-platform-deploy.result == 'success' && '✅ Success' || needs.multi-platform-deploy.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} | GitHub + Jenkins + GitLab |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Integration Type**: Hybrid CI/CD (GitHub Actions + Jenkins)" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Strategy**: Multi-platform orchestration" >> $GITHUB_STEP_SUMMARY
          echo "**Monitoring**: Cross-platform status tracking" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Create Alert on Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `🔧 Jenkins Integration Failed - ${new Date().toDateString()}`;
            const body = `
            ## 🔧 Jenkins Integration Failure
            
            **Time**: ${new Date().toISOString()}
            **Workflow**: Jenkins Integration & Hybrid CI/CD
            **GitHub Run**: [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            ### Integration Status:
            - **Jenkins Trigger**: ${{ needs.jenkins-trigger.result }}
            - **Jenkins Monitor**: ${{ needs.jenkins-monitor.result }}
            - **Multi-Platform Deploy**: ${{ needs.multi-platform-deploy.result }}
            
            ### Required Actions:
            1. Check Jenkins server connectivity
            2. Verify API credentials and permissions
            3. Review Jenkins job configuration
            4. Test integration endpoints
            5. Update workflow if needed
            
            ### Jenkins Details:
            - **Job**: ${{ github.event.inputs.jenkins_job || 'portfolio-build' }}
            - **Environment**: ${{ github.event.inputs.environment || 'staging' }}
            - **Build Number**: ${{ needs.jenkins-trigger.outputs.jenkins-build-number }}
            
            *This alert was automatically generated by the hybrid CI/CD system.*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['jenkins', 'integration', 'ci-cd', 'high-priority']
            });