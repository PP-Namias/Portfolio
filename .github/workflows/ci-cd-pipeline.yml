name: CI/CD Pipeline - Code Quality & Deployment

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest
    outputs:
      quality-status: ${{ steps.quality-check.outputs.status }}
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🔧 Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run Biome Code Quality Checks
        id: quality-check
        run: |
          echo "🔍 Running Biome CI checks..."
          if pnpm run biome:ci; then
            echo "✅ Code quality checks passed"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Code quality checks failed"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📊 Generate Code Quality Report
        if: always()
        run: |
          echo "## 📊 Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.quality-check.outputs.status }}" >> $GITHUB_STEP_SUMMARY

  # Job 2: Build and Test
  build-and-test:
    name: 🏗️ Build & Test Portfolio
    runs-on: ubuntu-latest
    needs: code-quality
    if: needs.code-quality.outputs.quality-status == 'success'
    outputs:
      build-status: ${{ steps.build.outputs.status }}
      
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🔧 Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Astro Type Check
        run: |
          echo "🔍 Running Astro type checking..."
          pnpm run astro:check || (echo "❌ Type check failed" && exit 1)

      - name: 🏗️ Build Portfolio
        id: build
        run: |
          echo "🏗️ Building portfolio..."
          if pnpm run build; then
            echo "✅ Build successful"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Build failed"
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📦 Upload Build Artifacts
        if: steps.build.outputs.status == 'success'
        uses: actions/upload-artifact@v3
        with:
          name: portfolio-build-${{ github.sha }}
          path: dist/
          retention-days: 30

      - name: 📊 Generate Build Report
        if: always()
        run: |
          echo "## 🏗️ Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Status**: ${{ steps.build.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Time**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact**: portfolio-build-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # Job 3: Security Audit
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    needs: code-quality
    if: needs.code-quality.outputs.quality-status == 'success'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Run Security Audit
        run: |
          echo "🔒 Running security audit..."
          pnpm audit --audit-level moderate

      - name: 🔍 Run Dependency Check
        run: |
          echo "🔍 Checking for outdated dependencies..."
          pnpm outdated || echo "Some dependencies may be outdated"

  # Job 4: Commit Logging and Analytics
  commit-analytics:
    name: 📈 Commit Analytics & Logging
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📊 Generate Commit Analytics
        run: |
          echo "## 📈 Commit Analytics Report" >> $GITHUB_STEP_SUMMARY
          echo "### Recent Commits" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git log --oneline -10 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          
          echo "### Commit Statistics" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Commits**: $(git rev-list --count HEAD)" >> $GITHUB_STEP_SUMMARY
          echo "- **Contributors**: $(git shortlog -sn | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Files Changed**: $(git diff --name-only HEAD~1 HEAD | wc -l)" >> $GITHUB_STEP_SUMMARY
          
          echo "### Files Modified in This Commit" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff --name-status HEAD~1 HEAD >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: 💾 Log Commit Details to File
        run: |
          mkdir -p logs
          {
            echo "=== COMMIT LOG ENTRY ==="
            echo "Timestamp: $(date -u)"
            echo "Commit SHA: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Author: ${{ github.actor }}"
            echo "Message: ${{ github.event.head_commit.message }}"
            echo "Files Modified:"
            git diff --name-only HEAD~1 HEAD
            echo "========================"
            echo ""
          } >> logs/commit-history.log

      - name: 📤 Upload Commit Logs
        uses: actions/upload-artifact@v3
        with:
          name: commit-logs-${{ github.sha }}
          path: logs/
          retention-days: 90

  # Job 5: Deployment (Production)
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [code-quality, build-and-test, security-audit]
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push' &&
      needs.code-quality.outputs.quality-status == 'success' &&
      needs.build-and-test.outputs.build-status == 'success'
    environment: production
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Download Build Artifacts
        uses: actions/download-artifact@v3
        with:
          name: portfolio-build-${{ github.sha }}
          path: dist/

      - name: 🚀 Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod'
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

      - name: 📊 Generate Deployment Report
        if: always()
        run: |
          echo "## 🚀 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Time**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy URL**: ${{ steps.deploy.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

      - name: 💾 Log Deployment Details
        if: always()
        run: |
          mkdir -p logs
          {
            echo "=== DEPLOYMENT LOG ENTRY ==="
            echo "Timestamp: $(date -u)"
            echo "Environment: Production"
            echo "Commit SHA: ${{ github.sha }}"
            echo "Deploy URL: ${{ steps.deploy.outputs.preview-url }}"
            echo "Status: ${{ job.status }}"
            echo "============================="
            echo ""
          } >> logs/deployment-history.log

  # Job 6: Error Handling and Notifications
  error-handling:
    name: 🚨 Error Handling & Notifications
    runs-on: ubuntu-latest
    needs: [code-quality, build-and-test, security-audit, deploy-production]
    if: failure()
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🚨 Generate Error Report
        run: |
          echo "## 🚨 Pipeline Failure Report" >> $GITHUB_STEP_SUMMARY
          echo "### Failed Jobs" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build & Test**: ${{ needs.build-and-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Audit**: ${{ needs.security-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment**: ${{ needs.deploy-production.result }}" >> $GITHUB_STEP_SUMMARY
          echo "### Debugging Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: 💾 Log Error Details
        run: |
          mkdir -p logs
          {
            echo "=== ERROR LOG ENTRY ==="
            echo "Timestamp: $(date -u)"
            echo "Workflow Run: ${{ github.run_id }}"
            echo "Commit SHA: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Actor: ${{ github.actor }}"
            echo "Failed Jobs:"
            echo "  - Code Quality: ${{ needs.code-quality.result }}"
            echo "  - Build & Test: ${{ needs.build-and-test.result }}"
            echo "  - Security Audit: ${{ needs.security-audit.result }}"
            echo "  - Deployment: ${{ needs.deploy-production.result }}"
            echo "======================"
            echo ""
          } >> logs/error-history.log

      - name: 📤 Upload Error Logs
        uses: actions/upload-artifact@v3
        with:
          name: error-logs-${{ github.sha }}
          path: logs/
          retention-days: 90

      - name: 📧 Create GitHub Issue for Failure
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `🚨 CI/CD Pipeline Failure - ${new Date().toISOString()}`;
            const body = `
            ## Pipeline Failure Report
            
            **Workflow Run**: [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref_name }}
            **Actor**: ${{ github.actor }}
            
            ### Failed Jobs
            - Code Quality: ${{ needs.code-quality.result }}
            - Build & Test: ${{ needs.build-and-test.result }}
            - Security Audit: ${{ needs.security-audit.result }}
            - Deployment: ${{ needs.deploy-production.result }}
            
            ### Next Steps
            1. Review the workflow logs for detailed error information
            2. Fix the identified issues
            3. Test locally before pushing
            4. Close this issue once resolved
            
            *This issue was automatically created by the CI/CD pipeline.*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'ci/cd', 'automated-issue']
            });

  # Job 7: Success Notifications and Cleanup
  success-cleanup:
    name: ✅ Success Cleanup & Notifications
    runs-on: ubuntu-latest
    needs: [code-quality, build-and-test, security-audit, deploy-production]
    if: success()
    
    steps:
      - name: ✅ Generate Success Report
        run: |
          echo "## ✅ Pipeline Success Report" >> $GITHUB_STEP_SUMMARY
          echo "### Completed Jobs" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Build & Test**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Audit**: ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment**: ✅ Deployed" >> $GITHUB_STEP_SUMMARY
          echo "### Performance Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Pipeline Time**: ${{ github.event.workflow_run.run_duration_ms }}ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: 💾 Log Success Details
        run: |
          mkdir -p logs
          {
            echo "=== SUCCESS LOG ENTRY ==="
            echo "Timestamp: $(date -u)"
            echo "Workflow Run: ${{ github.run_id }}"
            echo "Commit SHA: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "All jobs completed successfully"
            echo "=========================="
            echo ""
          } >> logs/success-history.log

      - name: 🧹 Cleanup Old Artifacts
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: artifacts } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - 30);
            
            for (const artifact of artifacts.artifacts) {
              const createdAt = new Date(artifact.created_at);
              if (createdAt < cutoffDate) {
                console.log(`Deleting old artifact: ${artifact.name}`);
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id
                });
              }
            }