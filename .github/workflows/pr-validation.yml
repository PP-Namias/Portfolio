name: 🔍 Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main, develop ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '8'

jobs:
  # Job 1: Fast Quality Checks
  quick-check:
    name: ⚡ Quick Quality Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: 📥 Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🗂️ Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🔧 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Lint Check
        id: lint
        run: |
          pnpm run lint
          echo "status=✅" >> $GITHUB_OUTPUT
        continue-on-error: false

      - name: 🔧 Type Check
        id: typecheck
        run: |
          pnpm exec tsc --noEmit
          echo "status=✅" >> $GITHUB_OUTPUT
        continue-on-error: false

      - name: 📊 PR Check Summary
        if: always()
        run: |
          echo "## ⚡ Quick Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ${{ steps.lint.outputs.status || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Check | ${{ steps.typecheck.outputs.status || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # Job 2: Build Verification
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: quick-check
    if: github.event.pull_request.draft == false
    steps:
      - name: 📥 Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: 🗂️ Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 🔧 Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Application
        run: pnpm run build

      - name: 📊 Build Success
        run: |
          echo "## 🏗️ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "✅ Application built successfully" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "dist" ]; then
            DIST_SIZE=$(du -sh dist | cut -f1)
            echo "- **Build Size**: $DIST_SIZE" >> $GITHUB_STEP_SUMMARY
          fi

  # Job 3: Dependency Security
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: quick-check
    if: github.event.pull_request.draft == false
    steps:
      - name: 📥 Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Security Audit
        run: |
          pnpm audit --audit-level moderate || echo "Audit completed with warnings"
          
          echo "## 🔒 Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependency audit completed" >> $GITHUB_STEP_SUMMARY

  # Job 4: PR Comment with Results
  comment:
    name: 💬 Update PR Comment
    runs-on: ubuntu-latest
    needs: [quick-check, build, security]
    if: always() && github.event.pull_request.draft == false
    permissions:
      pull-requests: write
    steps:
      - name: 💬 Post PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              quickCheck: '${{ needs.quick-check.result }}',
              build: '${{ needs.build.result }}',
              security: '${{ needs.security.result }}'
            };
            
            const statusIcon = (status) => {
              if (status === 'success') return '✅';
              if (status === 'failure') return '❌';
              return '⏭️';
            };
            
            const body = `
            ## 🔍 Pull Request Validation Results
            
            | Check | Status |
            |-------|--------|
            | ⚡ Quick Check | ${statusIcon(results.quickCheck)} ${results.quickCheck} |
            | 🏗️ Build | ${statusIcon(results.build)} ${results.build} |
            | 🔒 Security | ${statusIcon(results.security)} ${results.security} |
            
            **Overall Status**: ${results.quickCheck === 'success' && results.build === 'success' ? '✅ Ready to merge!' : '⚠️ Issues found'}
            
            ---
            *Automated PR validation • [View Details](${context.payload.repository.html_url}/actions/runs/${context.runId})*
            `;
            
            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Pull Request Validation Results')
            );
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }

  # Job 5: Auto-label PR
  label:
    name: 🏷️ Auto-label PR
    runs-on: ubuntu-latest
    needs: [build]
    if: needs.build.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - name: 🏷️ Add Labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['✅ tests-passing', 'ready-for-review']
            });
