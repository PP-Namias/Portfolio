name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
        name: Quality Check
        uses: actions/checkout@v4

      - name: Setup Node.js
          - name: Checkout PR
        with:
          node-version: ${{ env.NODE_VERSION }}
          - name: Setup Node.js

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
          - name: Install Dependencies

      - name: Type Check
          - name: Lint Check

      - name: Build
          - name: Type Check

      - name: Run Tests
          - name: Build

  security:
          - name: Run Tests
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
        name: Security Scan
        uses: actions/checkout@v4

      - name: Setup Node.js
          - name: Checkout PR
        with:
          node-version: ${{ env.NODE_VERSION }}
          - name: Setup Node.js

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
          - name: Install Dependencies

  comment:
          - name: Security Audit
    runs-on: ubuntu-latest
    needs: [quality-check, security]
    if: always() && github.event.pull_request.draft == false
        name: PR Status
      pull-requests: write
    steps:
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          - name: Post PR Comment
            const results = {
              qualityCheck: '${{ needs.quality-check.result }}',
              security: '${{ needs.security.result }}'
            };

            const icon = (s) => s === 'success' ? 'Passed' : s === 'failure' ? 'Failed' : 'Skipped';

            const body = `## Pull Request Validation Results

                const label = (s) => s === 'success' ? 'Passed' : s === 'failure' ? 'Failed' : 'Skipped';
            |-------|--------|
                const body = `## Pull Request Validation Results
            | Security Audit | ${icon(results.security)} (${results.security}) |

            **Overall**: ${results.qualityCheck === 'success' ? 'Ready to merge' : 'Issues found'}
                | Quality (Lint + Type + Build + Tests) | ${label(results.qualityCheck)} (${results.qualityCheck}) |
                | Security Audit | ${label(results.security)} (${results.security}) |
            *Automated PR validation • [View Details](${context.payload.repository.html_url}/actions/runs/${context.runId})*`;
                **Overall**: ${results.qualityCheck === 'success' ? 'Ready to merge' : 'Issues found'}
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Pull Request Validation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }
