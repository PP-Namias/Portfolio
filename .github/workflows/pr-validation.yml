name: Pull Request Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  quality-check:
    name: Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level moderate || echo "Audit completed with warnings"

  comment:
    name: PR Status
    runs-on: ubuntu-latest
    needs: [quality-check, security]
    if: always() && github.event.pull_request.draft == false && github.event.pull_request.head.repo.fork == false
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Post PR Comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const results = {
              qualityCheck: '${{ needs.quality-check.result }}',
              security: '${{ needs.security.result }}'
            };

            const label = (s) => s === 'success' ? 'Passed' : s === 'failure' ? 'Failed' : 'Skipped';

            const body = `## Pull Request Validation Results

            | Check | Status |
            |-------|--------|
            | Quality (Lint + Type + Build + Tests) | ${label(results.qualityCheck)} (${results.qualityCheck}) |
            | Security Audit | ${label(results.security)} (${results.security}) |

            **Overall**: ${results.qualityCheck === 'success' ? 'Ready to merge' : 'Issues found'}

            ---
            *Automated PR validation • [View Details](${context.payload.repository.html_url}/actions/runs/${context.runId})*`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Pull Request Validation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: body
              });
            }
