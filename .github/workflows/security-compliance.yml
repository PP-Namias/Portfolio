name: 🔒 Security & Compliance Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  # Job 1: Dependency Vulnerability Scanning
  dependency-security:
    name: 🔍 Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run pnpm Security Audit
        run: pnpm audit --audit-level moderate

      - name: 🔍 Run npm Security Audit (Backup)
        run: npm audit --audit-level moderate
        continue-on-error: true

      - name: 📊 Generate Security Report
        run: |
          echo "## 🔒 Dependency Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Tool**: pnpm audit" >> $GITHUB_STEP_SUMMARY
          echo "- **Audit Level**: Moderate and above" >> $GITHUB_STEP_SUMMARY

  # Job 2: CodeQL Security Analysis
  codeql-analysis:
    name: 🕵️ CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'typescript' ]
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🕵️ Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      - name: 🏗️ Build Project
        run: |
          npm install -g pnpm@${{ env.PNPM_VERSION }}
          pnpm install --frozen-lockfile
          pnpm run build

      - name: 🕵️ Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{matrix.language}}"

  # Job 3: Secret Scanning
  secret-scanning:
    name: 🔐 Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔐 Run TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: 📊 Generate Secret Scan Report
        run: |
          echo "## 🔐 Secret Scanning Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Tool**: TruffleHog" >> $GITHUB_STEP_SUMMARY
          echo "- **Scope**: Repository files" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ No secrets detected" >> $GITHUB_STEP_SUMMARY

  # Job 4: License Compliance Check
  license-compliance:
    name: 📜 License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 📜 Install License Checker
        run: npm install -g license-checker

      - name: 📜 Check License Compliance
        run: |
          license-checker --summary > license-summary.txt
          license-checker --csv > license-details.csv
          cat license-summary.txt

      - name: 📤 Upload License Reports
        uses: actions/upload-artifact@v3
        with:
          name: license-reports
          path: |
            license-summary.txt
            license-details.csv
          retention-days: 30

      - name: 📊 Generate License Report
        run: |
          echo "## 📜 License Compliance Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Tool**: license-checker" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Compliance check completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### License Summary:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat license-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Job 5: Docker Security (if applicable)
  docker-security:
    name: 🐳 Docker Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Build Docker Image (if Dockerfile exists)
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t portfolio-security-scan .
          else
            echo "No Dockerfile found, skipping Docker security scan"
            exit 0
          fi

      - name: 🔍 Run Docker Security Scan
        if: hashFiles('Dockerfile') != ''
        uses: anchore/scan-action@v3
        with:
          image: "portfolio-security-scan"
          fail-build: false

  # Job 6: Security Summary
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-security, codeql-analysis, secret-scanning, license-compliance]
    if: always()
    steps:
      - name: 📊 Generate Security Summary
        run: |
          echo "## 🔒 Security & Compliance Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Security Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Security | ${{ needs.dependency-security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ${{ needs.codeql-analysis.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scanning | ${{ needs.secret-scanning.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Compliance | ${{ needs.license-compliance.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Security Status**: ${{ (needs.dependency-security.result == 'success' && needs.codeql-analysis.result == 'success' && needs.secret-scanning.result == 'success' && needs.license-compliance.result == 'success') && '🛡️ All security checks passed!' || '⚠️ Some security issues detected' }}" >> $GITHUB_STEP_SUMMARY

      - name: 🚨 Create Security Issue on Failure
        if: failure() && (github.event_name == 'push' || github.event_name == 'schedule')
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `🚨 Security Scan Failed - ${new Date().toDateString()}`;
            const body = `
            ## Security Scan Failure Report
            
            The automated security scan has detected issues.
            
            **Date**: ${new Date().toISOString()}
            **Workflow Run**: [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Branch**: ${{ github.ref_name }}
            
            ### Failed Checks
            - Dependency Security: ${{ needs.dependency-security.result }}
            - CodeQL Analysis: ${{ needs.codeql-analysis.result }}
            - Secret Scanning: ${{ needs.secret-scanning.result }}
            - License Compliance: ${{ needs.license-compliance.result }}
            
            ### Required Actions
            1. Review the workflow logs for detailed error information
            2. Address any security vulnerabilities found
            3. Update dependencies if necessary
            4. Ensure no secrets are committed to the repository
            5. Verify license compliance
            
            *This issue was automatically created by the security scanning workflow.*
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'automated-issue', 'high-priority']
            });