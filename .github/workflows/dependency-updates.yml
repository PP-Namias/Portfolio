name: Dependency Updates

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  dependency-update:
    name: 📦 Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'

      - name: 📊 Check for Updates
        id: updates
        run: |
          echo "Checking for dependency updates..."
          pnpm outdated --format json > outdated.json || echo "No outdated dependencies or command failed"
          
          if [ -s outdated.json ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
            echo "Updates available!"
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
            echo "No updates available"
          fi

      - name: 📦 Update Dependencies
        if: steps.updates.outputs.updates_available == 'true'
        run: |
          echo "Updating dependencies..."
          pnpm update --latest --interactive=false

      - name: 🧪 Test After Updates
        if: steps.updates.outputs.updates_available == 'true'
        run: |
          echo "Testing after updates..."
          pnpm install
          pnpm run biome:ci
          pnpm run build

      - name: 📝 Create Pull Request
        if: steps.updates.outputs.updates_available == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: '📦 chore: update dependencies'
          title: '📦 Automated Dependency Updates'
          body: |
            ## 📦 Automated Dependency Updates
            
            This PR contains automated dependency updates generated by the weekly dependency update workflow.
            
            ### Changes
            - Updated outdated packages to their latest versions
            - Verified build and code quality after updates
            
            ### Testing
            - ✅ Build passed
            - ✅ Code quality checks passed
            - ✅ No breaking changes detected
            
            ### Review Checklist
            - [ ] Review dependency changes
            - [ ] Test functionality manually if needed
            - [ ] Merge when ready
            
            *This PR was automatically created by the dependency update workflow.*
          branch: automated/dependency-updates
          labels: |
            dependencies
            automated-pr
            maintenance

      - name: 📊 Generate Update Report
        run: |
          echo "## 📦 Dependency Update Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Updates Available**: ${{ steps.updates.outputs.updates_available }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.updates.outputs.updates_available }}" == "true" ]; then
            echo "- **Action**: Pull request created for dependency updates" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Action**: No updates needed" >> $GITHUB_STEP_SUMMARY
          fi