name: "Preview Deployment & PR Validation"

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'

jobs:
  # Job 1: Build and Deploy Preview
  deploy-preview:
    name: 🚀 Deploy Preview Environment
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🔧 Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run Quality Checks
        run: pnpm run ci:quality

      - name: 🏗️ Build Application
        run: pnpm run build

      - name: 🚀 Deploy to Vercel Preview
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prebuilt'
          working-directory: ./

      - name: 📝 Comment Preview URL
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('🚀 Preview Deployment')
            );
            
            const body = `## 🚀 Preview Deployment
            
            ✅ **Preview Environment Ready!**
            
            **🔗 Preview URL**: [${{ steps.deploy.outputs.preview-url }}](${{ steps.deploy.outputs.preview-url }})
            
            **📊 Deployment Details:**
            - **Commit**: \`${{ github.sha }}\`
            - **Branch**: \`${{ github.head_ref }}\`
            - **Environment**: Preview
            - **Built at**: ${new Date().toISOString()}
            
            **🧪 What to test:**
            - [ ] Homepage loads correctly
            - [ ] Blog posts are visible
            - [ ] Navigation works
            - [ ] Gallery functionality
            - [ ] Contact forms
            - [ ] Mobile responsiveness
            - [ ] Dark/Light mode toggle
            
            *This preview will be automatically updated when you push new commits.*`;
            
            if (botComment) {
              github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # Job 2: Visual Regression Testing
  visual-regression:
    name: 👁️ Visual Regression Testing
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: github.event.action != 'closed'
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎭 Install Playwright
        run: pnpm exec playwright install

      - name: 👁️ Run Visual Regression Tests
        run: |
          # Update base URL to use preview deployment
          sed -i 's|http://localhost:4321|${{ needs.deploy-preview.outputs.preview-url }}|g' playwright.config.ts
          pnpm exec playwright test --project=chromium tests/e2e/visual.spec.ts
        continue-on-error: true

      - name: 📤 Upload Visual Diff Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: visual-regression-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # Job 3: Lighthouse Performance Audit
  lighthouse-audit:
    name: ⚡ Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: github.event.action != 'closed'
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚡ Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            ${{ needs.deploy-preview.outputs.preview-url }}
            ${{ needs.deploy-preview.outputs.preview-url }}/about/
            ${{ needs.deploy-preview.outputs.preview-url }}/projects/
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: 📊 Comment Performance Results
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## ⚡ Lighthouse Performance Audit
            
            **📊 Performance metrics have been analyzed for the preview deployment.**
            
            **🔗 Preview URL**: [${{ needs.deploy-preview.outputs.preview-url }}](${{ needs.deploy-preview.outputs.preview-url }})
            
            **📈 Key Areas Tested:**
            - Performance Score
            - Accessibility Score  
            - Best Practices Score
            - SEO Score
            
            *Detailed results are available in the Lighthouse CI artifacts.*`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # Job 4: Accessibility Testing
  accessibility-audit:
    name: ♿ Accessibility Audit
    runs-on: ubuntu-latest
    needs: deploy-preview
    if: github.event.action != 'closed'
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: ♿ Run Accessibility Audit
        run: |
          # Update pa11y config to use preview URL
          sed -i 's|http://localhost:4321|${{ needs.deploy-preview.outputs.preview-url }}|g' .pa11yci.json
          pnpm run accessibility
        continue-on-error: true

      - name: 📊 Comment Accessibility Results
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## ♿ Accessibility Audit Results
            
            **📊 Accessibility testing completed for the preview deployment.**
            
            **🔗 Preview URL**: [${{ needs.deploy-preview.outputs.preview-url }}](${{ needs.deploy-preview.outputs.preview-url }})
            
            **🎯 Standards Tested:**
            - WCAG 2.1 AA Guidelines
            - Color contrast ratios
            - Keyboard navigation
            - Screen reader compatibility
            
            *Review the workflow logs for detailed accessibility findings.*`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  # Job 5: Cleanup Preview Environment
  cleanup-preview:
    name: 🧹 Cleanup Preview Environment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: 🧹 Remove Preview Deployment
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--remove'

      - name: 📝 Comment Cleanup Completion
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `## 🧹 Preview Environment Cleanup
            
            ✅ **Preview deployment has been removed.**
            
            The preview environment for this pull request has been automatically cleaned up.
            
            *Thank you for your contribution!*`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });